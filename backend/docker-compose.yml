version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: automation-agent-api
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=File & Workspace Automation Agent API
      - APP_VERSION=1.0.0
      - DEBUG=True
      - MONGODB_URI=${MONGODB_URI}
      - DB_NAME=automation_agent
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s