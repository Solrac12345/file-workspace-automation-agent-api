<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Automatización — Automation Agent</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div class="brand">
        <span class="brand__mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
        </span>
        <span>Automation Agent</span>
      </div>
      <a href="dashboard.html" class="badge">← Workspace</a>
    </header>

    <main class="glass-card">
      <div class="card-header">
        <h1>Reglas de automatización</h1>
        <p>Gestiona las reglas que el agente aplicará a los archivos del workspace.</p>
      </div>

      <!-- Form to create new rule -->
      <section class="new-rule-section" style="margin-bottom: 2rem; padding: 1.5rem; background: rgba(255,255,255,0.05); border-radius: 0.5rem;">
        <h3 style="margin-bottom: 1rem; font-size: 1.1rem;">Crear nueva regla</h3>
        <form id="newRuleForm" style="display: grid; gap: 1rem;">
          <div class="field">
            <label for="ruleName">Nombre de la regla</label>
            <input type="text" id="ruleName" placeholder="Ej: Mover PDFs a Contabilidad" required>
          </div>
          
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="field">
              <label for="ruleFileType">Tipo de archivo</label>
              <select id="ruleFileType" required>
                <option value="pdf">PDF</option>
                <option value="image">Imagen</option>
                <option value="document">Documento</option>
                <option value="spreadsheet">Hoja de cálculo</option>
                <option value="presentation">Presentación</option>
                <option value="archive">Archivo comprimido</option>
                <option value="all">Todos</option>
              </select>
            </div>
            
            <div class="field">
              <label for="ruleAction">Acción</label>
              <select id="ruleAction" required>
                <option value="move">Mover</option>
                <option value="rename">Renombrar</option>
                <option value="classify">Clasificar</option>
                <option value="delete">Eliminar</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="ruleDestination">Carpeta destino</label>
            <input type="text" id="ruleDestination" placeholder="/workspace/carpeta/" required>
          </div>

          <div class="field">
            <label for="ruleDescription">Descripción (opcional)</label>
            <input type="text" id="ruleDescription" placeholder="Descripción de lo que hace esta regla">
          </div>

          <button type="submit" class="btn btn--primary">Crear regla</button>
        </form>
      </section>

      <!-- Dynamic rules list -->
      <div class="option-list" id="rulesList">
        <!-- Rules will be loaded dynamically here -->
        <div class="option-row" style="opacity: 0.5;">
          <span class="option-row__text">
            Cargando reglas...
            <span class="option-row__hint">Conectando con la base de datos</span>
          </span>
        </div>
      </div>

      <button type="button" class="btn btn--secondary" onclick="refreshRules()" style="margin-top: 1rem;">
         Actualizar lista
      </button>
    </main>

    <footer class="page-footer">
      Las reglas se guardan automáticamente en MongoDB Atlas.
    </footer>
  </div>

  <!-- Load API module first -->
  <script src="js/api.js"></script>
  
  <!-- Load automation logic -->
  <script src="js/automation.js"></script>
</body>
</html>
