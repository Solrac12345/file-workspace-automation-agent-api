<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace — Automation Agent</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell app-shell--wide">
    <header class="top-bar top-bar--wide">
      <div class="brand">
        <span class="brand__mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
        </span>
        <span>Workspace</span>
      </div>
      <!-- User info and logout button -->
      <div class="user-info" style="display: flex; align-items: center; gap: 1rem;">
        <span class="badge" id="userBadge">Cargando...</span>
        <button type="button" class="btn btn--secondary" id="logoutBtn" style="padding: 0.5rem 1rem; font-size: 0.875rem;">
          Cerrar sesión
        </button>
      </div>
    </header>

    <main class="glass-card glass-card--lg glass-card--stagger">
      <div class="card-header card-header--left">
        <h2>Tu espacio de trabajo</h2>
        <p id="welcomeMessage">Bienvenido al workspace.</p>
      </div>

      <div class="dashboard-grid">
        <!-- Stats cards with dynamic data -->
        <div class="stat-card">
          <span class="stat-card__value" id="fileCount">0</span>
          <span class="stat-card__label">Archivos en carpeta</span>
        </div>
        <div class="stat-card">
          <span class="stat-card__value stat-card__value--status" id="automationStatus">Cargando...</span>
          <span class="stat-card__label">Estado de automatización</span>
        </div>

        <!-- Files panel -->
        <section class="file-panel" aria-labelledby="files-heading">
          <h3 id="files-heading" class="stat-card__label" style="margin-bottom: 0.75rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;">
            Archivos Recientes
          </h3>
          <ul class="file-list" id="fileList">
            <!-- Files will be loaded dynamically here -->
            <li class="file-item" style="opacity: 0.5;">
              <span class="file-item__icon" aria-hidden="true">⏳</span>
              <span class="file-item__name">Cargando archivos...</span>
              <span class="file-item__meta">—</span>
            </li>
          </ul>

          <div class="actions-block">
            <button type="button" class="btn btn--secondary">Subir archivo</button>
            <button type="button" class="btn btn--secondary">Crear workspace</button>
            <button type="button" class="btn btn--primary" onclick="goAutomation()">Automatización</button>
          </div>
        </section>
      </div>
    </main>

    <footer class="page-footer page-footer--wide">
      Evidencia académica · File &amp; Workspace Automation Agent
    </footer>
  </div>

  <!-- Load API module first -->
  <script src="js/api.js"></script>
  
  <!-- Load dashboard logic -->
  <script src="js/dashboard.js"></script>
</body>
</html>
